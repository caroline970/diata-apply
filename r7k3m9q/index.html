<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Diata — Phone Auditions</title>
<style>
  :root{
    --bg:#ffffff; --card:#ffffff; --ink:#0b0b0b; --muted:#5d6677;
    --navy:#20307f; --line:#e6eaf2; --green:#1f7a44; --amber:#9a6b12; --red:#c23b3b;
    --accent:#eef1fb;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0e1220; --card:#161b2c; --ink:#eef1f8; --muted:#9aa3ba;
      --navy:#a9bdf0; --line:#28304a; --green:#63c48c; --amber:#e0b667; --red:#e97b7b; --accent:#1b2138; }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,'Segoe UI',sans-serif;line-height:1.5;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:640px;margin:0 auto;padding:0 15px 72px;}
  .topbar{position:sticky;top:0;z-index:20;background:var(--bg);
    border-bottom:1px solid var(--line);padding:12px 2px 10px;margin-bottom:8px;}
  .brand{font-family:Georgia,serif;font-weight:700;font-size:12px;text-transform:uppercase;
    color:var(--navy);letter-spacing:.18em;}
  h1{font-family:Georgia,serif;font-weight:700;font-size:21px;line-height:1.15;
    margin:5px 0 8px;color:var(--ink);}
  .tallyrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .chip{font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:20px;
    font-variant-numeric:tabular-nums;}
  .chip.y{background:rgba(31,122,68,.13);color:var(--green);}
  .chip.m{background:rgba(154,107,18,.15);color:var(--amber);}
  .chip.n{background:rgba(194,59,59,.13);color:var(--red);}
  .chip.l{background:var(--accent);color:var(--muted);}
  .send{margin-left:auto;font-family:system-ui;cursor:pointer;border:none;
    background:var(--navy);color:#fff;font-weight:700;font-size:13px;padding:8px 14px;border-radius:9px;}
  .send:active{opacity:.8;}
  .divider{font-family:Georgia,serif;font-weight:700;color:var(--navy);font-size:13px;
    text-transform:uppercase;letter-spacing:.05em;margin:22px 2px 10px;
    padding-bottom:5px;border-bottom:1.5px solid var(--line);}
  .card{display:flex;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px 11px;margin-bottom:10px;transition:border-color .12s,opacity .12s;}
  .card.d-yes{border-color:var(--green);border-width:2px;}
  .card.d-maybe{border-color:var(--amber);}
  .card.d-no{opacity:.5;}
  .card.dead{opacity:.5;}
  .rank{flex:0 0 26px;font-family:Georgia,serif;font-weight:700;font-size:15px;
    color:var(--navy);font-variant-numeric:tabular-nums;padding-top:1px;}
  .body{flex:1;min-width:0;}
  .row1{display:flex;align-items:baseline;gap:9px;}
  .name{font-family:Georgia,serif;font-weight:700;font-size:16.5px;color:var(--ink);}
  .rate{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--green);
    font-variant-numeric:tabular-nums;white-space:nowrap;}
  .why{font-size:13px;color:var(--muted);margin:6px 0 9px;}
  .why b{color:var(--ink);}
  .flag{color:var(--amber);font-weight:700;}
  .actions{display:flex;align-items:center;gap:7px;}
  .listen{text-decoration:none;font-size:13.5px;font-weight:700;color:var(--navy);
    border:1.5px solid var(--navy);border-radius:9px;padding:7px 12px;white-space:nowrap;}
  .listen:active{background:var(--accent);}
  .listen2{font-size:12px;color:var(--muted);text-decoration:none;font-weight:600;}
  .verdict{margin-left:auto;display:flex;gap:5px;}
  .vb{font-family:system-ui;cursor:pointer;border:1.5px solid var(--line);background:var(--card);
    color:var(--ink);font-weight:700;font-size:15px;width:40px;height:38px;border-radius:9px;}
  .vb.yes.on{background:var(--green);border-color:var(--green);color:#fff;}
  .vb.maybe.on{background:var(--amber);border-color:var(--amber);color:#fff;}
  .vb.no.on{background:var(--red);border-color:var(--red);color:#fff;}
  textarea.note{width:100%;margin-top:9px;min-height:34px;padding:8px 10px;
    font-family:system-ui;font-size:13px;background:var(--bg);color:var(--ink);
    border:1.5px solid var(--line);border-radius:9px;resize:vertical;outline:none;}
  textarea.note:focus{border-color:var(--navy);}
  .src{font-size:11px;color:var(--muted);background:var(--accent);
    padding:2px 7px;border-radius:6px;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">Diata Health</div>
    <h1>Phone Coordinator — re-sorted 7/15</h1>
    <div class="tallyrow" id="tally"></div>
    <div id="saved" style="font-size:12px;font-weight:700;margin-top:5px;min-height:15px;opacity:0;transition:opacity .3s;"></div>
  </div>
  <p style="font-size:12.5px;color:var(--muted);margin:2px 2px 4px;">Sections: <b>Listen next</b> (for your polish + confidence bar) &rarr; <b>Interviewed</b> &rarr; the rest. Your ✓/~/✕ + notes are saved from before. Tap <b>▶ Listen</b>, mark, note, then <b>Send my picks</b>.</p>
  <div id="list"></div>
</div>

<script>
const SHARE = id => `https://www.loom.com/share/${id}`;
const C = [
  {n:"Novisse Anne Oding", rate:"$8", src:"No profile link", loom:"1d69f4737c7c4b779fa6d1a42cbeda36", sep:"★ Listen next — for your polish + confidence bar", why:"Confident; 8–10 yrs phone / patient & customer work, WFH since 2017. Reads self-assured — worth hearing for premium presence."},
  {n:"Cecilio Sabroso Jr", rate:"$10", src:"OnlineJobs", loom:"1d58c9c06ed548148857ba25a8743847", why:"Explicitly premium-service framing ('world-class service, smile so it's audible'); fluent. Listen for whether the polish truly lands."},
  {n:"Gemma Macalua", rate:"$10", src:"OnlineJobs", loom:"a0241b9735c443f8bd2b7b87713b7977", why:"Polished + real US-healthcare depth (prior auth, appeals, scheduling). Listen for premium tone."},
  {n:"Abegail Ang", rate:"$10", src:"OnlineJobs", loom:"402c1fa7fa3345d9a8de879e7f666f0c", why:"<b>Re-listen.</b> I heard 'most polished + confident of the group'; you heard 'young.' With accent off the table, worth a second pass for the sales-y first voice."},
  {n:"Christopher Buffard", rate:"—", src:"Indeed · Brazil", loom:"4120d7f67ee34a60bf3496a46552d0be", why:"Your 'Good!' maybe — mature, professional, EN/FR/PT. One of the more premium-sounding of the pool. Decide: second round?"},

  {n:"Loren Mae Flores", rate:"$8", src:"OnlineJobs", loom:"56b09583b5a141daacc61f57dd945650", sep:"Interviewed — Wed 7/15", why:"★ <b>Your top pick — moved to next round (resume + 2 references requested).</b> Interviewed 7/15: warm, natural, good on the phone; recently married, no kids; says she wants 'permanent.' Rate ~<b>$8</b> (said 8–9, not $10). <span class='flag'>⚠ Job-jump watch:</span> ~1.5 yr at current role, leaving because underpaid, running two jobs at once, 'committed through 7/27' but offered to start 7/20 — verify hard via references. OnlineJobs profile now DEACTIVATED. (Interview not captured in Granola.)"},
  {n:"Cornelio B. Manzano III, MD", rate:"$10", src:"OnlineJobs", loom:"25639f84576c41d3a58e465aff73ad0e", why:"Interviewed. Deeply on-model — MD who ran GLP-1 free-consult calls + functional-med exposure; calm, professional, prefers phone. Warmth is measured, not effusive (your read is fair for a sales-y first voice). <b>Not a job-hopper</b> — left both roles for real reasons. Wants $10, 40 hrs, 12-hr time diff."},
  {n:"Ma. Liwaya Rinabeth Lobiano", rate:"$8", src:"OnlineJobs", loom:"a508a1d8338c4674bb2b9fe4c6fd45a0", why:"Interviewed (Maria). Genuinely lovely, warm, humble, reliable; real admin/scheduling/CS (Optum). But English polish + confidence aren't premium-first-voice level ('I won't be one of your top picks'). <b>Perfect for a future scheduling/support seat</b> — not this one."},

  {n:"Jhon Christian Las", rate:"$8", src:"OnlineJobs", loom:"33a72aa541154057b4eb4ad14ce01771", sep:"The rest of the pool", why:"RN + BPO + patient-care coordinator; fluent, genuinely empathetic. You flagged mid accent — but very kind. Value at $8."},
  {n:"Justine Mae Amon", rate:"$10", src:"OnlineJobs", loom:"21371508c5434160bc126f8602cfe0d0", why:"You: 'too foreign for sales, good for support.' Park as a <b>support/billing</b> option (she knows insurance), not the premium voice."},
  {n:"Bethyll De La Cura", rate:"$10", src:"OnlineJobs", loom:"2498f6f8d6f84f738ed30eac26001ec3", why:"Warm, kind RN — but you felt 'not premium enough.'"},
  {n:"Maryam Blanco", rate:"$6–10", src:"OnlineJobs", loom:"354eea4fc37249dca237a5bbe2af1c2e", why:"RN, calms skeptical patients; flexible on rate."},
  {n:"Dave Leonardo", rate:"$8", src:"OnlineJobs", loom:"315810280a46410fb023db22614355ff", why:"Remote nurse, phone + video intake; clear, process-oriented; warmth moderate."},
  {n:"Goodness Ughachukwu", rate:"$8", src:"Torre", loom:"033651978f7d4146886fd6ec7dedaf2a", why:"MD &rarr; patient-care coordinator; fluent, slight accent."},
  {n:"Jobelyn Faulmino", rate:"$7", src:"OnlineJobs", loom:"4c381d3a3b2545d48101145d389f317c", why:"16 yrs phone support, US-comfortable; strong value at $7."},
  {n:"Angela Flordeliz", rate:"$7", src:"OnlineJobs", loom:"69521afe1a224f6fb55b355b6a7cb2ed", why:"US-insurance advocate — great for billing; more transactional than warm."},
  {n:"Nyakno Peter", rate:"$6", src:"No profile link", loom:"400969ae0abc4adbbc09b7381bbd5fb6", why:"RN/medical VA; relevant, lowest rate; less standout on polish."},
  {n:"Ner Porras", rate:"$9", src:"No profile", loom:"9301d48819e74ccbbcd9c4197157c3d9", why:"~2 yrs, remote dental scheduler (US). Lighter experience."},
  {n:"Ma. Imelda Balberan", rate:"$8", src:"OnlineJobs", loom:"4ef66d01d1c7406e8f0005df2b83f72e", why:"CS at Teleperformance + sales; no healthcare yet — verify."},
  {n:"Julio M Cordova Jr", rate:"$7–8", src:"OnlineJobs · 3 takes", loom:"4b5223e995664731b2325632e7f0fec1", loom2:"5dd830b760b147b68992fd037c1cdb65", why:"Fluent (psychometrician, AZ clinic) — but submitted 3× (follow-instructions flag)."},
  {n:"Juan Jose Hernandez Lira", rate:"$9", src:"LatAm · no profile", loom:"19969760ba3444aea535ac54978eb0f7", why:"US-insurance CS; understandable but less polished."},
  {n:"Charie Jean Temones", rate:"$10", src:"OnlineJobs", loom:"1ebf12456e4e43feb28039769d5d8e79", why:"Fluent, friendly — but example was non-medical; $10 top of band."},
  {n:"Michael Peralta", rate:"$7", src:"No profile", loom:"c8d135e9d5924407993a128b943c84d7", why:"Medical interpreter — terminology + empathy, but interpreting isn't phone-coordination."},

  {n:"Alejandra Borbolla Sarachaga", rate:"$15", src:"LatAm · no profile", loom:"b4896fa8cafe43429d4f5094c0f91b2f", sep:"No transcript — watch manually", why:"Highest ask $15. <span class='flag'>No auto-transcript</span> — watch to judge."},
  {n:"Monique Belardo", rate:"$8", src:"OnlineJobs", loom:"e6719096ec7a4459a83d34265b84c088", why:"<span class='flag'>No transcript</span> — watch to judge."},
  {n:"Pearl Torremocha", rate:"$7", src:"OnlineJobs", loom:"357ae4f98d8b430b9db4b8e92dbd6f86", dead:true, why:"<span class='flag'>⚠ Loom wouldn't load</span> — try, else re-request."},
  {n:"Andy Ramos", rate:"$8", src:"OnlineJobs", loom:"3d7cd68eb9b04e5abc46f04c749b18d1", dead:true, why:"<span class='flag'>⚠ Loom wouldn't load</span> — try, else re-request."},

  {n:"Milasol S. Buenaventura", rate:"$8", src:"LinkedIn", loom:"e484e1ccccc244b1b88f7a06a852a5da", sep:"Pass", why:"Recorded in Tagalog — can't verify English."},
];

const KEY = "diata-phone-auditions-v2";
let STORAGE_OK = true;
try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); } catch(e){ STORAGE_OK = false; }
let store = {};
try { store = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e){ store = {}; }
let flashTimer = null;
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(store)); } catch(e){ STORAGE_OK = false; }
  const f = document.getElementById("saved");
  if(f){
    f.textContent = STORAGE_OK ? "Saved ✓" : "⚠ Not saving — Send picks often";
    f.style.color = STORAGE_OK ? "var(--green)" : "var(--red)";
    f.style.opacity = "1";
    clearTimeout(flashTimer);
    if(STORAGE_OK) flashTimer = setTimeout(()=>{ f.style.opacity = "0"; }, 1200);
  }
}
const cid = n => "c-" + n.replace(/[^a-z0-9]/gi,"");

function decide(n, v){
  store[n] = store[n] || {};
  store[n].d = (store[n].d === v) ? "" : v;
  save();
  const card = document.getElementById(cid(n));
  card.className = "card" + (store[n].d ? " d-"+store[n].d : "") + (card.dataset.dead==="1" ? " dead" : "");
  card.querySelectorAll(".vb").forEach(b => b.classList.remove("on"));
  if(store[n].d) card.querySelector(".vb."+store[n].d).classList.add("on");
  tally();
}
function setNote(n, val){ store[n] = store[n] || {}; store[n].note = val; save(); }

function tally(){
  let y=0,m=0,no=0;
  C.forEach(c => { const d=(store[c.n]||{}).d; if(d==="yes")y++; else if(d==="maybe")m++; else if(d==="no")no++; });
  document.getElementById("tally").innerHTML =
    `<span class="chip y">${y} Yes</span>
     <span class="chip m">${m} Maybe</span>
     <span class="chip n">${no} No</span>
     <span class="chip l">${C.length-y-m-no} left</span>
     <button class="send" onclick="sendPicks()">Send my picks →</button>`;
}
function sendPicks(){
  const line = c => `${c.n} (${c.rate}${c.rate!=="—"?"/hr":""})` + ((store[c.n]||{}).note ? ` — ${store[c.n].note}` : "");
  const grp = v => C.filter(c => (store[c.n]||{}).d === v).map(line);
  const y=grp("yes"), m=grp("maybe"), n=grp("no");
  if(!y.length && !m.length && !n.length){ alert("Set some ✓ / ~ / ✕ first."); return; }
  let b = "My phone-audition picks:\n\n";
  if(y.length) b += "YES ("+y.length+"):\n" + y.join("\n") + "\n\n";
  if(m.length) b += "MAYBE ("+m.length+"):\n" + m.join("\n") + "\n\n";
  if(n.length) b += "NO ("+n.length+"):\n" + n.join("\n") + "\n";
  location.href = `mailto:caroline@diatahealth.com?subject=${encodeURIComponent("Phone auditions — my picks")}&body=${encodeURIComponent(b)}`;
}

const list = document.getElementById("list");
C.forEach((c, i) => {
  if(c.sep){
    const d = document.createElement("div");
    d.className = "divider";
    d.textContent = c.sep;
    list.appendChild(d);
  }
  const st = store[c.n] || {};
  const card = document.createElement("div");
  card.className = "card" + (st.d ? " d-"+st.d : "") + (c.dead ? " dead" : "");
  card.id = cid(c.n);
  if(c.dead) card.dataset.dead = "1";
  card.innerHTML = `
    <div class="rank">${i+1}</div>
    <div class="body">
      <div class="row1">
        <span class="name">${c.n}</span>
        <span class="rate">${c.rate}${c.rate!=="—"?"/hr":""}</span>
      </div>
      <div class="why">${c.why}</div>
      <div class="actions">
        <a class="listen" href="${SHARE(c.loom)}" target="_blank" rel="noopener">▶ Listen</a>
        ${c.loom2 ? `<a class="listen2" href="${SHARE(c.loom2)}" target="_blank" rel="noopener">Take 2 ↗</a>` : `<span class="src">${c.src}</span>`}
        <div class="verdict">
          <button class="vb yes ${st.d==="yes"?"on":""}" onclick="decide('${c.n.replace(/'/g,"\\'")}','yes')">✓</button>
          <button class="vb maybe ${st.d==="maybe"?"on":""}" onclick="decide('${c.n.replace(/'/g,"\\'")}','maybe')">~</button>
          <button class="vb no ${st.d==="no"?"on":""}" onclick="decide('${c.n.replace(/'/g,"\\'")}','no')">✕</button>
        </div>
      </div>
      <textarea class="note" placeholder="Note…" oninput="setNote('${c.n.replace(/'/g,"\\'")}', this.value)" onblur="setNote('${c.n.replace(/'/g,"\\'")}', this.value)">${st.note||""}</textarea>
    </div>`;
  list.appendChild(card);
});
tally();
if(!STORAGE_OK){
  const f = document.getElementById("saved");
  f.textContent = "⚠ Your browser isn't saving marks (private mode?) — tap Send my picks often so nothing is lost.";
  f.style.color = "var(--red)"; f.style.opacity = "1";
}
</script>
</body>
</html>
